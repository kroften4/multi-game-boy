[base]
extra_scripts = pre:gen_compile_commands.py
build_flags = !python gen_includes.py

[env:esp]
extends = base
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
lib_deps = bodmer/TFT_eSPI@^2.5.43
; 480*320 ILI9486 display
; need to copy the include flag which is otherwise overriden
build_flags =
    !python gen_includes.py
    -D USER_SETUP_LOADED=1
    -D TFT_PARALLEL_8_BIT=1
    -D ILI9486_DRIVER=1
    -D TFT_WIDTH=480
    -D TFT_HEIGHT=320
    -D TFT_RGB_ORDER=TFT_BGR
    -D TFT_RD=17
    -D TFT_WR=16
    ; RS
    -D TFT_DC=4
    -D TFT_CS=2
    -D TFT_RST=15
    -D TFT_D0=5
    -D TFT_D1=18
    -D TFT_D2=13
    -D TFT_D3=12
    -D TFT_D4=14
    -D TFT_D5=27
    -D TFT_D6=26
    -D TFT_D7=25
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -O2
